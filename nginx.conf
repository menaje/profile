server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # cache static assets
    location ~* \.(css|js|woff2|png|jpg|jpeg|webp|svg|ico|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Astro clean URLs: try /path/index.html then /path.html then 404
    location / {
        try_files $uri $uri/ $uri/index.html $uri.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
