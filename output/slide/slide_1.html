<!DOCTYPE html>
<html lang="ko">
<head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#0066FF",
        "on-primary": "#ffffff",
        "surface": "#F8FAFC",
        "on-surface": "#0F172A",
        "surface-variant": "#F1F5F9",
        "on-surface-variant": "#475569",
        "outline": "#CBD5E1",
        "outline-variant": "#E2E8F0",
        "secondary": "#0D9488",
        "accent": "#6366F1",
        "error": "#DC2626",
        "warning": "#D97706",
        "info": "#0891B2"
      },
      fontFamily: {
        "headline": ["Pretendard Slide", "Manrope", "Apple SD Gothic Neo", "Malgun Gothic", "sans-serif"],
        "body": ["Pretendard Slide", "Manrope", "Apple SD Gothic Neo", "Malgun Gothic", "sans-serif"],
        "label": ["Pretendard Slide", "Manrope", "Apple SD Gothic Neo", "Malgun Gothic", "sans-serif"]
      },
      borderRadius: {
        "DEFAULT": "4px",
        "lg": "8px",
        "xl": "12px",
        "full": "9999px"
      },
    },
  },
}
</script>
<style>
@font-face {
  font-family: "Pretendard Slide";
  src: url("../../public/fonts/pretendard-regular-subset.woff2") format("woff2");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Pretendard Slide";
  src: url("../../public/fonts/pretendard-semibold-subset.woff2") format("woff2");
  font-weight: 600;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Pretendard Slide";
  src: url("../../public/fonts/pretendard-bold-subset.woff2") format("woff2");
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}
.glass-card {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
</style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary/20">
<!-- 메인 콘텐츠 -->
<main class="min-h-screen pt-14 pb-12 relative overflow-hidden bg-surface">
  <!-- 배경 장식 요소 -->
  <div class="absolute inset-0 opacity-40 overflow-hidden pointer-events-none">
    <div class="absolute -top-[20%] -left-[10%] w-[60%] h-[80%] rounded-full bg-primary/10 blur-[120px]"></div>
    <div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[70%] rounded-full bg-primary/5 blur-[100px]"></div>
    <div class="absolute inset-0" style="background-image: radial-gradient(circle at 2px 2px, rgba(0,102,255,0.05) 1px, transparent 0); background-size: 48px 48px;"></div>
  </div>

  <div class="container mx-auto px-12 z-10 flex flex-col md:flex-row items-start justify-between gap-12">
    <!-- 타이틀 섹션 -->
    <div class="w-full md:w-[64%] space-y-6 pt-2">
      <div class="w-20 h-1.5 bg-primary mb-8"></div>
      <h1 class="font-headline text-5xl md:text-7xl font-extrabold text-on-surface tracking-tight leading-[1.1]">
        설계·CM 데이터 관리 구조와<br/>
        <span class="text-primary">AI 활용 체계</span>
      </h1>
      <p class="text-on-surface-variant text-xl md:text-2xl font-medium tracking-tight max-w-3xl border-l-4 border-primary/20 pl-6 py-2">
        프로젝트 데이터의 연속성 확보와<br/>
        전사 지식 전이를 위한 공통 기반 설계
      </p>
    </div>

    <!-- 우측 장식 요소 -->
    <div class="hidden lg:block w-[28%] max-w-[320px] shrink-0 pt-4">
      <div class="relative w-full aspect-[0.92] glass-card rounded-xl border border-outline flex items-center justify-center p-6 shadow-sm">
        <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent rounded-xl"></div>
        <div class="relative w-full h-full border border-primary/10 rounded-lg flex flex-col items-center justify-center gap-4">
          <span class="material-symbols-outlined text-primary text-6xl" style="font-variation-settings: 'FILL' 0;">architecture</span>
          <div class="text-center">
            <div class="text-on-surface-variant text-[10px] font-bold tracking-[0.3em] mb-1">데이터 구조 설계</div>
            <div class="text-on-surface font-headline font-extrabold text-lg tracking-tight">AI 활용 전략</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 하단 키워드 카드 -->
  <div class="absolute bottom-16 left-0 w-full px-12 z-20">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-5 max-w-5xl mx-auto">
      <!-- 데이터 관리 -->
      <div class="bg-white p-6 rounded-lg border border-outline-variant flex flex-col items-center gap-4 group hover:border-primary hover:shadow-lg transition-all duration-300">
        <div class="p-3.5 bg-primary/5 rounded-full group-hover:bg-primary/10 transition-colors">
          <span class="material-symbols-outlined text-primary text-3xl">database</span>
        </div>
        <span class="text-on-surface font-extrabold text-sm tracking-tight">데이터 관리</span>
      </div>
      <!-- AI 활용 -->
      <div class="bg-white p-6 rounded-lg border border-outline-variant flex flex-col items-center gap-4 group hover:border-primary hover:shadow-lg transition-all duration-300">
        <div class="p-3.5 bg-primary/5 rounded-full group-hover:bg-primary/10 transition-colors">
          <span class="material-symbols-outlined text-primary text-3xl">psychology</span>
        </div>
        <span class="text-on-surface font-extrabold text-sm tracking-tight">AI 활용</span>
      </div>
      <!-- 시스템 설계 -->
      <div class="bg-white p-6 rounded-lg border border-outline-variant flex flex-col items-center gap-4 group hover:border-primary hover:shadow-lg transition-all duration-300">
        <div class="p-3.5 bg-primary/5 rounded-full group-hover:bg-primary/10 transition-colors">
          <span class="material-symbols-outlined text-primary text-3xl">settings_input_component</span>
        </div>
        <span class="text-on-surface font-extrabold text-sm tracking-tight">시스템 설계</span>
      </div>
      <!-- 보안 통제 -->
      <div class="bg-white p-6 rounded-lg border border-outline-variant flex flex-col items-center gap-4 group hover:border-primary hover:shadow-lg transition-all duration-300">
        <div class="p-3.5 bg-primary/5 rounded-full group-hover:bg-primary/10 transition-colors">
          <span class="material-symbols-outlined text-primary text-3xl">admin_panel_settings</span>
        </div>
        <span class="text-on-surface font-extrabold text-sm tracking-tight">보안 통제</span>
      </div>
    </div>
  </div>
</main>

<script>
function fitSlideToViewport() {
  const main = document.querySelector("main");
  if (!main) return;

  document.body.style.margin = "0";
  document.body.style.overflow = "hidden";
  document.documentElement.style.overflow = "hidden";

  main.style.transform = "";
  main.style.transformOrigin = "";
  main.style.willChange = "transform";

  const naturalHeight = Math.max(
    document.documentElement.scrollHeight,
    document.body.scrollHeight,
    Math.ceil(main.getBoundingClientRect().height),
  );
  const naturalWidth = Math.max(
    document.documentElement.scrollWidth,
    document.body.scrollWidth,
    Math.ceil(main.getBoundingClientRect().width),
  );
  const scale = Math.min(1, window.innerHeight / naturalHeight, window.innerWidth / naturalWidth);

  main.style.transformOrigin = "top center";
  main.style.transform = `scale(${scale})`;
}

window.addEventListener("load", () => {
  fitSlideToViewport();
  window.setTimeout(fitSlideToViewport, 120);
  window.setTimeout(fitSlideToViewport, 400);
  if (document.fonts?.ready) {
    document.fonts.ready.then(() => requestAnimationFrame(fitSlideToViewport));
  }
});

window.addEventListener("resize", fitSlideToViewport);
</script>


</body>
</html>
