<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>설계·CM 데이터 관리 구조와 AI 활용 체계</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#0066FF",
        "on-primary": "#ffffff",
        "surface": "#F8FAFC",
        "on-surface": "#0F172A",
        "surface-variant": "#F1F5F9",
        "on-surface-variant": "#475569",
        "outline": "#CBD5E1",
        "outline-variant": "#E2E8F0",
        "secondary": "#0D9488",
        "accent": "#6366F1",
        "error": "#DC2626",
        "warning": "#D97706",
        "info": "#0891B2"
      },
      fontFamily: {
        "headline": ["Pretendard Slide", "Manrope", "Apple SD Gothic Neo", "Malgun Gothic", "sans-serif"],
        "body": ["Pretendard Slide", "Manrope", "Apple SD Gothic Neo", "Malgun Gothic", "sans-serif"],
        "label": ["Pretendard Slide", "Manrope", "Apple SD Gothic Neo", "Malgun Gothic", "sans-serif"]
      },
    },
  },
}
</script>
<style>
  @font-face {
    font-family: "Pretendard Slide";
    src: url("../../public/fonts/pretendard-regular-subset.woff2") format("woff2");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Pretendard Slide";
    src: url("../../public/fonts/pretendard-semibold-subset.woff2") format("woff2");
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Pretendard Slide";
    src: url("../../public/fonts/pretendard-bold-subset.woff2") format("woff2");
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  html, body {
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  body { margin: 0; overflow: hidden; height: 100vh; }
  iframe { border: none; width: 100%; height: 100%; }
  .nav-dot { transition: all 0.2s ease; }
  .nav-dot.active { background-color: #0066FF; color: #ffffff; transform: scale(1.15); }
  .nav-dot:not(.active):hover { background-color: #E2E8F0; }
  .slide-title { opacity: 0; transform: translateY(4px); transition: all 0.15s ease; }
  .nav-dot:hover .slide-title { opacity: 1; transform: translateY(0); }
  .control-bar { transition: opacity 0.3s ease; }
</style>
</head>
<body class="bg-on-surface font-body">

<!-- 컨트롤 바 -->
<div class="control-bar fixed bottom-0 left-0 w-full z-50 bg-white/95 backdrop-blur-md border-t border-outline-variant px-6 py-3 flex items-center justify-between">

  <!-- 좌측: 제목 -->
  <div class="flex items-center gap-3 shrink-0">
    <span class="material-symbols-outlined text-primary text-xl">slideshow</span>
    <span class="font-headline font-extrabold text-sm text-on-surface tracking-tight hidden sm:inline">설계·CM 데이터 관리</span>
  </div>

  <!-- 중앙: 네비게이션 -->
  <div class="flex items-center gap-2">
    <!-- 이전 버튼 -->
    <button onclick="goTo(current - 1)" class="w-8 h-8 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors" aria-label="이전 슬라이드">
      <span class="material-symbols-outlined text-lg">chevron_left</span>
    </button>

    <!-- 슬라이드 번호 -->
    <div class="flex items-center gap-1" id="nav-dots"></div>

    <!-- 다음 버튼 -->
    <button onclick="goTo(current + 1)" class="w-8 h-8 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors" aria-label="다음 슬라이드">
      <span class="material-symbols-outlined text-lg">chevron_right</span>
    </button>
  </div>

  <!-- 우측: 페이지 표시 + 전체화면 -->
  <div class="flex items-center gap-3 shrink-0">
    <span class="text-on-surface-variant text-xs font-semibold tracking-wider" id="page-indicator">01 / 12</span>
    <button onclick="toggleFullscreen()" class="w-8 h-8 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors" aria-label="전체화면">
      <span class="material-symbols-outlined text-lg" id="fullscreen-icon">fullscreen</span>
    </button>
  </div>
</div>

<!-- 슬라이드 영역 -->
<div class="w-full" style="height: calc(100vh - 52px);">
  <iframe id="slide-frame" src="slide_1.html" title="슬라이드"></iframe>
</div>

<script>
const TOTAL = 12;
let current = 1;
const slideFrame = document.getElementById("slide-frame");

const titles = [
  "타이틀",
  "핵심 요약",
  "문제 인식",
  "PMIS 한계",
  "맥락 저장소",
  "데이터 전이",
  "AI 활용",
  "업무별 정책",
  "영업·CM 시스템",
  "설계·PMO 시스템",
  "5대 백본",
  "결론"
];

function fitCurrentSlide() {
  const doc = slideFrame.contentDocument;
  if (!doc) return;

  const root = doc.documentElement;
  const body = doc.body;
  const main = doc.querySelector("main") || body;
  if (!body || !main) return;

  body.style.margin = "0";
  body.style.overflow = "hidden";
  root.style.overflow = "hidden";

  main.style.transform = "";
  main.style.transformOrigin = "";
  main.style.willChange = "transform";

  const mainRect = main.getBoundingClientRect();
  const naturalHeight = Math.max(
    Math.ceil(root.scrollHeight),
    Math.ceil(body.scrollHeight),
    Math.ceil(mainRect.height),
  );
  const naturalWidth = Math.max(
    Math.ceil(root.scrollWidth),
    Math.ceil(body.scrollWidth),
    Math.ceil(mainRect.width),
  );
  const availableHeight = slideFrame.clientHeight;
  const availableWidth = slideFrame.clientWidth;
  const scale = Math.min(1, availableHeight / naturalHeight, availableWidth / naturalWidth);

  main.style.transformOrigin = "top center";
  main.style.transform = `scale(${scale})`;
}

function queueFitCurrentSlide() {
  requestAnimationFrame(fitCurrentSlide);
  window.setTimeout(fitCurrentSlide, 120);
  window.setTimeout(fitCurrentSlide, 400);

  const doc = slideFrame.contentDocument;
  if (doc?.fonts?.ready) {
    doc.fonts.ready.then(() => requestAnimationFrame(fitCurrentSlide));
  }
}

// 네비게이션 도트 생성
const navContainer = document.getElementById("nav-dots");
for (let i = 1; i <= TOTAL; i++) {
  const dot = document.createElement("button");
  dot.className = "nav-dot relative w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold text-on-surface-variant bg-transparent cursor-pointer";
  dot.textContent = String(i).padStart(2, "0");
  dot.setAttribute("aria-label", `슬라이드 ${i}: ${titles[i - 1]}`);
  dot.onclick = () => goTo(i);

  // 툴팁
  const tooltip = document.createElement("span");
  tooltip.className = "slide-title absolute -top-8 left-1/2 -translate-x-1/2 whitespace-nowrap text-[10px] font-bold text-on-surface bg-white px-2 py-1 rounded shadow-md border border-outline-variant pointer-events-none";
  tooltip.textContent = titles[i - 1];
  dot.appendChild(tooltip);

  navContainer.appendChild(dot);
}

function goTo(n) {
  if (n < 1 || n > TOTAL) return;
  current = n;
  slideFrame.src = `slide_${n}.html`;
  document.getElementById("page-indicator").textContent = `${String(n).padStart(2, "0")} / ${TOTAL}`;

  // 도트 상태 업데이트
  const dots = navContainer.querySelectorAll(".nav-dot");
  dots.forEach((dot, idx) => {
    dot.classList.toggle("active", idx + 1 === n);
  });
}

slideFrame.addEventListener("load", () => {
  queueFitCurrentSlide();
});

function toggleFullscreen() {
  const icon = document.getElementById("fullscreen-icon");
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    icon.textContent = "fullscreen_exit";
  } else {
    document.exitFullscreen();
    icon.textContent = "fullscreen";
  }
}

// 키보드 네비게이션
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === " ") {
    e.preventDefault();
    goTo(current + 1);
  } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
    e.preventDefault();
    goTo(current - 1);
  } else if (e.key === "Home") {
    e.preventDefault();
    goTo(1);
  } else if (e.key === "End") {
    e.preventDefault();
    goTo(TOTAL);
  } else if (e.key === "f" || e.key === "F") {
    toggleFullscreen();
  }
});

window.addEventListener("resize", () => {
  queueFitCurrentSlide();
});

document.addEventListener("fullscreenchange", () => {
  queueFitCurrentSlide();
});

// 초기화
goTo(1);
</script>

</body>
</html>
